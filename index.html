<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mini CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#0e0e10">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --gold:#D4AF37; --gold-light:#f1d979; --black:#0e0e10; --black2:#161618;
  --pink:#ff7aa8; --green:#8fd19e; --pink-dark:#e85d92; --green-dark:#4caf6a;
  --bg:#0e0e10; --surface:#1a1a1d; --surface2:#222226; --text:#f2f2f2; --muted:#9a9aa0;
  --accent:#D4AF37; --accent2:#f1d979; --radius:16px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --danger:#e5484d; --warn:#f5a623; --ok:#3ddc84;
}
[data-theme="pinkgreen"]{
  --bg:#fff6f9; --surface:#ffffff; --surface2:#fdeef3; --text:#2b2b2b; --muted:#8a8a8a;
  --accent:#ff7aa8; --accent2:#8fd19e; --shadow:0 10px 30px rgba(232,93,146,.15);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Segoe UI', Tahoma, Arial, sans-serif;
  background:var(--bg); color:var(--text);
  transition:background .4s ease, color .4s ease;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--accent); border-radius:10px;}

.hidden{display:none !important;}

/* ---------- شاشة الدخول ---------- */
#authScreen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; position:relative;
}
#authScreen::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 20% 20%, var(--accent) 0%, transparent 35%),
             radial-gradient(circle at 80% 80%, var(--accent2) 0%, transparent 35%);
  opacity:.08; pointer-events:none;
}
.auth-card{
  background:var(--surface); border-radius:var(--radius); padding:36px 30px;
  width:100%; max-width:400px; box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.06);
  animation:popIn .5s cubic-bezier(.2,.9,.3,1.1);
  position:relative; z-index:1;
}
@keyframes popIn{from{opacity:0; transform:translateY(24px) scale(.96);} to{opacity:1; transform:translateY(0) scale(1);}}
.auth-title{
  text-align:center; font-size:26px; font-weight:800; margin-bottom:4px;
  color:var(--accent); letter-spacing:.5px;
}
.auth-sub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:24px;}
.tabs{display:flex; background:var(--surface2); border-radius:12px; padding:4px; margin-bottom:22px;}
.tab-btn{
  flex:1; padding:10px; border:none; background:transparent; color:var(--muted);
  font-weight:700; border-radius:10px; cursor:pointer; transition:.3s;
}
.tab-btn.active{background:var(--accent); color:#111;}
.field{margin-bottom:16px; position:relative;}
.field label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid rgba(255,255,255,.08);
  background:var(--surface2); color:var(--text); font-size:14px; outline:none;
  transition:border-color .25s, box-shadow .25s;
}
.field input:focus, .field select:focus, .field textarea:focus{
  border-color:var(--accent); box-shadow:0 0 0 3px rgba(212,175,55,.15);
}
.btn{
  width:100%; padding:13px; border:none; border-radius:12px; font-weight:800; font-size:15px;
  cursor:pointer; transition:transform .2s, box-shadow .2s, filter .2s;
  background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#111;
}
.btn:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,.25); filter:brightness(1.05);}
.btn:active{transform:translateY(0) scale(.98);}
.btn-outline{background:transparent; border:1.5px solid var(--accent); color:var(--accent);}
.msg{font-size:13px; text-align:center; margin-top:12px; min-height:18px;}
.msg.error{color:var(--danger);}
.msg.ok{color:var(--ok);}
.spinner{
  width:18px; height:18px; border-radius:50%; border:3px solid rgba(0,0,0,.2);
  border-top-color:#111; display:inline-block; animation:spin .7s linear infinite; vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- التطبيق الرئيسي ---------- */
#app{display:flex; min-height:100vh;}
.sidebar{
  width:280px; background:var(--surface); border-left:1px solid rgba(255,255,255,.06);
  padding:22px 18px; display:flex; flex-direction:column; gap:18px;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:19px; color:var(--accent);}
.brand .dot{width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent);}
.user-chip{
  background:var(--surface2); border-radius:12px; padding:12px 14px; font-size:13px;
}
.user-chip b{color:var(--accent);}
.stat-box{
  background:var(--surface2); border-radius:14px; padding:14px; text-align:center;
  transition:transform .25s;
}
.stat-box:hover{transform:translateY(-3px);}
.stat-box .num{font-size:24px; font-weight:800; color:var(--accent);}
.stat-box .lbl{font-size:12px; color:var(--muted);}
.stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.chart-wrap{background:var(--surface2); border-radius:14px; padding:12px; height:210px;}
.theme-switch{display:flex; gap:8px;}
.theme-dot{
  flex:1; height:40px; border-radius:10px; cursor:pointer; border:2px solid transparent;
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
  transition:.25s;
}
.theme-dot.gold{background:linear-gradient(135deg,#111,#D4AF37); color:#D4AF37;}
.theme-dot.pink{background:linear-gradient(135deg,#ff7aa8,#8fd19e); color:#fff;}
.theme-dot.active{border-color:var(--text); transform:scale(1.05);}
.logout-btn{margin-top:auto; background:transparent; border:1.5px solid var(--danger); color:var(--danger);
  padding:10px; border-radius:10px; font-weight:700; cursor:pointer; transition:.25s;}
.logout-btn:hover{background:var(--danger); color:#fff;}

.main{flex:1; padding:24px; max-width:100%; overflow-x:hidden;}
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;}
.topbar h1{font-size:22px; color:var(--accent);}
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.toolbar input, .toolbar select{
  padding:10px 12px; border-radius:10px; border:1.5px solid rgba(255,255,255,.08);
  background:var(--surface2); color:var(--text); font-size:13px;
}
.add-btn{
  background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#111;
  border:none; padding:10px 18px; border-radius:10px; font-weight:800; cursor:pointer;
  transition:.25s;
}
.add-btn:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,.25);}

.grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px;
}
.card{
  background:var(--surface); border-radius:var(--radius); padding:16px; position:relative;
  border-right:6px solid var(--status-color, var(--accent));
  box-shadow:var(--shadow); transition:transform .25s, box-shadow .25s;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
.card:hover{transform:translateY(-4px); box-shadow:0 16px 34px rgba(0,0,0,.3);}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.card-name{font-size:17px; font-weight:800;}
.status-badge{
  font-size:11px; font-weight:800; padding:4px 10px; border-radius:20px; color:#111;
  background:var(--status-color, var(--accent)); white-space:nowrap;
}
.card-phone{color:var(--muted); font-size:13px; margin:6px 0;}
.card-notes{
  font-size:13px; color:var(--muted); margin:8px 0; max-height:50px; overflow:hidden;
  line-height:1.4;
}
.card-last{font-size:11px; color:var(--muted); margin-bottom:10px;}
.card-actions{display:flex; gap:8px; flex-wrap:wrap;}
.icon-btn{
  border:none; border-radius:10px; padding:8px 12px; font-size:13px; cursor:pointer; font-weight:700;
  display:flex; align-items:center; gap:6px; transition:.2s;
}
.icon-btn:hover{transform:translateY(-2px);}
.wa-btn{background:#25D366; color:#fff;}
.edit-btn{background:var(--surface2); color:var(--text); border:1.5px solid var(--accent);}
.del-btn{background:transparent; color:var(--danger); border:1.5px solid var(--danger);}

.empty-state{
  text-align:center; padding:60px 20px; color:var(--muted);
}

/* ---------- المودال ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center;
  justify-content:center; z-index:999; padding:16px; animation:fadeIn .25s;
}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal{
  background:var(--surface); border-radius:var(--radius); padding:26px; max-width:420px; width:100%;
  box-shadow:var(--shadow); animation:popIn .3s;
  max-height:90vh; overflow-y:auto;
}
.modal h2{color:var(--accent); margin-bottom:16px; font-size:19px;}
.status-picker{display:flex; gap:8px; margin-bottom:16px;}
.status-opt{
  flex:1; padding:10px 4px; text-align:center; border-radius:10px; cursor:pointer;
  font-size:12px; font-weight:700; border:2px solid transparent; color:#111; transition:.2s;
}
.status-opt.active{border-color:var(--text); transform:scale(1.05);}
.modal-actions{display:flex; gap:10px; margin-top:8px;}

/* ---------- توست ---------- */
#toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--surface2); color:var(--text); padding:12px 22px; border-radius:12px;
  box-shadow:var(--shadow); font-size:13px; opacity:0; pointer-events:none; transition:.35s;
  border:1px solid var(--accent); z-index:1200;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

#installBanner{
  position:fixed; bottom:0; left:0; right:0; background:var(--surface2); padding:14px 18px;
  display:flex; justify-content:space-between; align-items:center; gap:12px; z-index:1100;
  box-shadow:0 -6px 20px rgba(0,0,0,.25); transform:translateY(100%); transition:.4s;
}
#installBanner.show{transform:translateY(0);}
#installBanner span{font-size:13px;}
#installBanner .btn{width:auto; padding:8px 16px; font-size:13px;}

.loader-overlay{
  position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center;
  z-index:2000; flex-direction:column; gap:12px;
}
.big-spinner{
  width:46px; height:46px; border-radius:50%; border:4px solid rgba(212,175,55,.2);
  border-top-color:var(--accent); animation:spin .8s linear infinite;
}

@media (max-width:820px){
  #app{flex-direction:column;}
  .sidebar{width:100%; height:auto; position:relative; flex-direction:row; flex-wrap:wrap;}
  .sidebar > *{flex:1 1 45%;}
  .chart-wrap{flex:1 1 100%; height:180px;}
  .logout-btn{flex:1 1 100%;}
}
</style>
</head>
<body data-theme="gold">

<div class="loader-overlay" id="pageLoader">
  <div class="big-spinner"></div>
  <div style="color:var(--muted); font-size:13px;">جاري التحميل...</div>
</div>

<!-- ============ شاشة الدخول/التسجيل ============ -->
<div id="authScreen" class="hidden">
  <div class="auth-card">
    <div class="auth-title">✦ Mini CRM</div>
    <div class="auth-sub">إدارة عملائك بذكاء وبساطة</div>
    <div class="tabs">
      <button class="tab-btn active" id="tabLoginBtn">دخول</button>
      <button class="tab-btn" id="tabRegisterBtn">حساب جديد</button>
    </div>

    <form id="loginForm">
      <div class="field">
        <label>اسم المستخدم</label>
        <input type="text" id="loginUsername" required autocomplete="username">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="loginBtn">دخول</button>
      <div class="msg" id="loginMsg"></div>
    </form>

    <form id="registerForm" class="hidden">
      <div class="field">
        <label>اسم المستخدم (مميز - بدون تكرار)</label>
        <input type="text" id="regUsername" required minlength="3">
      </div>
      <div class="field">
        <label>كلمة المرور (7 أرقام/أحرف على الأقل)</label>
        <input type="password" id="regPassword" required minlength="7">
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="regEmail" required>
      </div>
      <button type="submit" class="btn" id="registerBtn">إنشاء الحساب</button>
      <div class="msg" id="registerMsg"></div>
    </form>
  </div>
</div>

<!-- ============ التطبيق الرئيسي ============ -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="brand"><span class="dot"></span> Mini CRM</div>

    <div class="user-chip">مرحبًا، <b id="sideUsername">-</b></div>

    <div class="stats-grid">
      <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">إجمالي العملاء</div></div>
      <div class="stat-box"><div class="num" id="statHot">0</div><div class="lbl">ساخن 🔥</div></div>
      <div class="stat-box"><div class="num" id="statWarm">0</div><div class="lbl">محتمل ⚡</div></div>
      <div class="stat-box"><div class="num" id="statCold">0</div><div class="lbl">بارد ❄️</div></div>
    </div>

    <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>

    <div>
      <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">الثيم</div>
      <div class="theme-switch">
        <div class="theme-dot gold active" data-theme="gold">ذهبي</div>
        <div class="theme-dot pink" data-theme="pinkgreen">زهري</div>
      </div>
    </div>

    <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>عملاؤك</h1>
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="بحث بالاسم أو الموبايل...">
        <select id="filterStatus">
          <option value="all">كل الحالات</option>
          <option value="hot">ساخن</option>
          <option value="warm">محتمل</option>
          <option value="cold">بارد</option>
        </select>
        <button class="add-btn" id="openAddModal">+ عميل جديد</button>
      </div>
    </div>

    <div class="grid" id="clientsGrid"></div>
    <div class="empty-state hidden" id="emptyState">لا يوجد عملاء حتى الآن — ابدأ بإضافة أول عميل ✨</div>
  </main>
</div>

<!-- ============ مودال الإضافة/التعديل ============ -->
<div class="modal-overlay hidden" id="clientModalOverlay">
  <div class="modal">
    <h2 id="modalTitle">عميل جديد</h2>
    <form id="clientForm">
      <input type="hidden" id="clientId">
      <div class="field">
        <label>اسم العميل</label>
        <input type="text" id="clientName" required>
      </div>
      <div class="field">
        <label>رقم الموبايل (بصيغة دولية بدون +، مثال: 201012345678)</label>
        <input type="tel" id="clientPhone" required>
      </div>
      <div class="field">
        <label>حالة العميل</label>
        <div class="status-picker" id="statusPicker">
          <div class="status-opt" data-status="hot" style="background:#e5484d;">ساخن 🔥</div>
          <div class="status-opt" data-status="warm" style="background:#f5a623;">محتمل ⚡</div>
          <div class="status-opt" data-status="cold" style="background:#4a90e2;">بارد ❄️</div>
        </div>
      </div>
      <div class="field">
        <label>ملاحظات</label>
        <textarea id="clientNotes" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal">إلغاء</button>
        <button type="submit" class="btn" id="saveClientBtn">حفظ</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>
<div id="installBanner">
  <span>📲 ثبّت التطبيق على شاشتك الرئيسية لتجربة أسرع</span>
  <div style="display:flex; gap:8px;">
    <button class="btn" id="installBtn">تثبيت</button>
    <button class="btn btn-outline" id="dismissInstall">لاحقًا</button>
  </div>
</div>

<script>
/* =================== إعدادات الربط بالباك اند (Google Apps Script) ===================
 * حط هنا رابط الـ Web App اللي ظهر لك بعد الضغط على Deploy في Apps Script.
 * لازم يكون بالشكل: https://script.google.com/macros/s/XXXXXXXX/exec
 */
const API_URL = 'https://script.google.com/macros/s/AKfycbw9kHBfC127v2VEH16kEsz-rrF35msCDURqbuyxwdHKEepOFeliv5E-fa_P4870oUK-/exec';

/* استدعاء الباك اند عبر POST بصيغة text/plain لتجنّب مشاكل CORS preflight */
function callApi(action, payload){
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload })
  })
  .then(res => res.json());
}

/* تسجيل Service Worker لتفعيل خصائص PWA (عمل بدون إنترنت + التثبيت) */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW error:', err));
  });
}

/* =================== إعدادات عامة =================== */
const STATUS_COLORS = { hot:'#e5484d', warm:'#f5a623', cold:'#4a90e2' };
const STATUS_LABELS = { hot:'ساخن 🔥', warm:'محتمل ⚡', cold:'بارد ❄️' };

let CURRENT_USER = null;
let CLIENTS = [];
let statusChartInstance = null;
let trendChartInstance = null;

/* =================== أدوات مساعدة =================== */
function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? '#e5484d' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function setLoading(el, loading, originalText){
  if(loading){ el.disabled = true; el.dataset.original = el.innerHTML; el.innerHTML = '<span class="spinner"></span>'; }
  else { el.disabled = false; el.innerHTML = el.dataset.original || originalText; }
}
function hideLoader(){ document.getElementById('pageLoader').classList.add('hidden'); }

/* =================== تبديل التبويبات (دخول/تسجيل) =================== */
document.getElementById('tabLoginBtn').addEventListener('click', ()=>{
  document.getElementById('tabLoginBtn').classList.add('active');
  document.getElementById('tabRegisterBtn').classList.remove('active');
  document.getElementById('loginForm').classList.remove('hidden');
  document.getElementById('registerForm').classList.add('hidden');
});
document.getElementById('tabRegisterBtn').addEventListener('click', ()=>{
  document.getElementById('tabRegisterBtn').classList.add('active');
  document.getElementById('tabLoginBtn').classList.remove('active');
  document.getElementById('registerForm').classList.remove('hidden');
  document.getElementById('loginForm').classList.add('hidden');
});

/* =================== تسجيل الدخول =================== */
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMsg');
  msg.textContent=''; msg.className='msg';
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  setLoading(btn, true);

  callApi('login', { username, password })
    .then(function(res){
      setLoading(btn, false, 'دخول');
      if(res.ok){
        CURRENT_USER = res.username;
        localStorage.setItem('mcrm_user', res.username);
        enterApp();
      } else {
        msg.textContent = res.message; msg.classList.add('error');
      }
    })
    .catch(function(err){
      setLoading(btn, false, 'دخول');
      msg.textContent = 'خطأ في الاتصال: ' + err.message; msg.classList.add('error');
    });
});

/* =================== إنشاء حساب =================== */
document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  const msg = document.getElementById('registerMsg');
  msg.textContent=''; msg.className='msg';
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  setLoading(btn, true);

  callApi('register', { username, password, email })
    .then(function(res){
      setLoading(btn, false, 'إنشاء الحساب');
      if(res.ok){
        msg.textContent = res.message; msg.classList.add('ok');
        setTimeout(()=>{
          document.getElementById('tabLoginBtn').click();
          document.getElementById('loginUsername').value = username;
        }, 900);
      } else {
        msg.textContent = res.message; msg.classList.add('error');
      }
    })
    .catch(function(err){
      setLoading(btn, false, 'إنشاء الحساب');
      msg.textContent = 'خطأ في الاتصال: ' + err.message; msg.classList.add('error');
    });
});

/* =================== دخول التطبيق =================== */
function enterApp(){
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sideUsername').textContent = CURRENT_USER;
  loadClients();
}

function logout(){
  CURRENT_USER = null;
  localStorage.removeItem('mcrm_user');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('loginPassword').value = '';
}
document.getElementById('logoutBtn').addEventListener('click', logout);

/* =================== تحميل العملاء =================== */
function loadClients(){
  callApi('getClients', { username: CURRENT_USER })
    .then(function(res){
      if(res.ok){ CLIENTS = res.data; renderClients(); renderStats(); }
      else showToast(res.message, true);
    })
    .catch(function(err){ showToast('خطأ: ' + err.message, true); });
}

/* =================== عرض العملاء =================== */
function renderClients(){
  const grid = document.getElementById('clientsGrid');
  const empty = document.getElementById('emptyState');
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const filter = document.getElementById('filterStatus').value;

  let list = CLIENTS.filter(c=>{
    const matchSearch = !search || (c.name||'').toLowerCase().includes(search) || (c.phone||'').includes(search);
    const matchFilter = filter==='all' || c.status===filter;
    return matchSearch && matchFilter;
  });

  grid.innerHTML = '';
  if(list.length===0){ empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  list.sort((a,b)=> new Date(b.lastContact||b.createdAt) - new Date(a.lastContact||a.createdAt));

  list.forEach(c=>{
    const color = STATUS_COLORS[c.status] || '#999';
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--status-color', color);
    const waLink = 'https://wa.me/' + (c.phone||'').replace(/[^0-9]/g,'');
    const lastContactStr = c.lastContact ? new Date(c.lastContact).toLocaleString('ar-EG') : '-';

    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${escapeHtml(c.name)}</div>
        <div class="status-badge" style="--status-color:${color}; background:${color};">${STATUS_LABELS[c.status]||c.status}</div>
      </div>
      <div class="card-phone">📱 ${escapeHtml(c.phone)}</div>
      <div class="card-notes">${escapeHtml(c.notes||'بدون ملاحظات')}</div>
      <div class="card-last">آخر تواصل: ${lastContactStr}</div>
      <div class="card-actions">
        <a class="icon-btn wa-btn" href="${waLink}" target="_blank" onclick="markContacted('${c.id}')">💬 واتساب</a>
        <button class="icon-btn edit-btn" onclick="openEditModal('${c.id}')">✏️ تعديل</button>
        <button class="icon-btn del-btn" onclick="removeClient('${c.id}')">🗑️ حذف</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

document.getElementById('searchInput').addEventListener('input', renderClients);
document.getElementById('filterStatus').addEventListener('change', renderClients);

/* =================== تحديث آخر تواصل عند فتح واتساب =================== */
function markContacted(id){
  const c = CLIENTS.find(x=>x.id===id);
  if(!c) return;
  c.lastContact = new Date().toISOString();
  callApi('updateClient', { username: CURRENT_USER, client: c }).catch(()=>{});
}

/* =================== المودال: إضافة/تعديل =================== */
let selectedStatus = 'warm';

function openStatusPicker(){
  document.querySelectorAll('.status-opt').forEach(el=>{
    el.classList.toggle('active', el.dataset.status===selectedStatus);
    el.addEventListener('click', ()=>{
      selectedStatus = el.dataset.status;
      document.querySelectorAll('.status-opt').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
    });
  });
}

document.getElementById('openAddModal').addEventListener('click', ()=>{
  document.getElementById('modalTitle').textContent = 'عميل جديد';
  document.getElementById('clientId').value = '';
  document.getElementById('clientName').value = '';
  document.getElementById('clientPhone').value = '';
  document.getElementById('clientNotes').value = '';
  selectedStatus = 'warm';
  openStatusPicker();
  document.getElementById('clientModalOverlay').classList.remove('hidden');
});

function openEditModal(id){
  const c = CLIENTS.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modalTitle').textContent = 'تعديل عميل';
  document.getElementById('clientId').value = c.id;
  document.getElementById('clientName').value = c.name;
  document.getElementById('clientPhone').value = c.phone;
  document.getElementById('clientNotes').value = c.notes;
  selectedStatus = c.status || 'warm';
  openStatusPicker();
  document.getElementById('clientModalOverlay').classList.remove('hidden');
}

document.getElementById('cancelModal').addEventListener('click', ()=>{
  document.getElementById('clientModalOverlay').classList.add('hidden');
});

document.getElementById('clientForm').addEventListener('submit', function(e){
  e.preventDefault();
  const btn = document.getElementById('saveClientBtn');
  const id = document.getElementById('clientId').value;
  const data = {
    id: id || undefined,
    name: document.getElementById('clientName').value.trim(),
    phone: document.getElementById('clientPhone').value.trim(),
    status: selectedStatus,
    notes: document.getElementById('clientNotes').value.trim(),
    lastContact: new Date().toISOString()
  };
  setLoading(btn, true);

  if(id){
    callApi('updateClient', { username: CURRENT_USER, client: data })
      .then(function(res){
        setLoading(btn, false, 'حفظ');
        if(res.ok){ showToast('تم التحديث ✅'); document.getElementById('clientModalOverlay').classList.add('hidden'); loadClients(); }
        else showToast(res.message, true);
      })
      .catch(function(err){ setLoading(btn, false, 'حفظ'); showToast(err.message, true); });
  } else {
    callApi('addClient', { username: CURRENT_USER, client: data })
      .then(function(res){
        setLoading(btn, false, 'حفظ');
        if(res.ok){ showToast('تمت الإضافة ✅'); document.getElementById('clientModalOverlay').classList.add('hidden'); loadClients(); }
        else showToast(res.message, true);
      })
      .catch(function(err){ setLoading(btn, false, 'حفظ'); showToast(err.message, true); });
  }
});

function removeClient(id){
  if(!confirm('هل تريد حذف هذا العميل؟')) return;
  callApi('deleteClient', { username: CURRENT_USER, clientId: id })
    .then(function(res){
      if(res.ok){ showToast('تم الحذف 🗑️'); loadClients(); }
      else showToast(res.message, true);
    })
    .catch(function(err){ showToast(err.message, true); });
}

/* =================== الإحصائيات + Chart.js =================== */
function renderStats(){
  const total = CLIENTS.length;
  const hot = CLIENTS.filter(c=>c.status==='hot').length;
  const warm = CLIENTS.filter(c=>c.status==='warm').length;
  const cold = CLIENTS.filter(c=>c.status==='cold').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statHot').textContent = hot;
  document.getElementById('statWarm').textContent = warm;
  document.getElementById('statCold').textContent = cold;

  renderStatusChart(hot, warm, cold);
  renderTrendChart();
}

function renderStatusChart(hot, warm, cold){
  const ctx = document.getElementById('statusChart');
  const data = {
    labels: ['ساخن', 'محتمل', 'بارد'],
    datasets: [{ data: [hot, warm, cold], backgroundColor: ['#e5484d','#f5a623','#4a90e2'], borderWidth: 0 }]
  };
  const options = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ position:'bottom', labels:{ color: '#D4AF37', font:{size:11} } }, title:{ display:true, text:'توزيع الحالات', color: '#D4AF37', font:{size:12} } }
  };
  if(statusChartInstance){ statusChartInstance.data = data; statusChartInstance.update(); return; }
  statusChartInstance = new Chart(ctx, { type:'doughnut', data, options });
}

function renderTrendChart(){
  const days = [];
  const counts = [];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const key = d.toLocaleDateString('ar-EG', {day:'2-digit', month:'2-digit'});
    days.push(key);
    const count = CLIENTS.filter(c=>{
      const cd = new Date(c.createdAt);
      return cd.toDateString() === d.toDateString();
    }).length;
    counts.push(count);
  }
  const ctx = document.getElementById('trendChart');
  const data = {
    labels: days,
    datasets: [{ label:'عملاء جدد', data: counts, borderColor:'#D4AF37', backgroundColor:'rgba(212,175,55,.25)', tension:.4, fill:true }]
  };
  const options = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false }, title:{ display:true, text:'نشاط آخر 7 أيام', color:'#D4AF37', font:{size:12} } },
    scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1, color:'#999' } }, x:{ ticks:{ color:'#999' } } }
  };
  if(trendChartInstance){ trendChartInstance.data = data; trendChartInstance.update(); return; }
  trendChartInstance = new Chart(ctx, { type:'line', data, options });
}

/* =================== الثيمات =================== */
document.querySelectorAll('.theme-dot').forEach(dot=>{
  dot.addEventListener('click', ()=>{
    const theme = dot.dataset.theme;
    document.body.setAttribute('data-theme', theme);
    document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));
    dot.classList.add('active');
    localStorage.setItem('mcrm_theme', theme);
    setTimeout(renderStats, 50);
  });
});

/* =================== PWA: التثبيت (قد لا يعمل داخل إطار Apps Script - راجع الشرح المرفق) =================== */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async ()=>{
  document.getElementById('installBanner').classList.remove('show');
  if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
});
document.getElementById('dismissInstall').addEventListener('click', ()=>{
  document.getElementById('installBanner').classList.remove('show');
});

/* =================== بدء التشغيل =================== */
window.addEventListener('load', function(){
  const savedTheme = localStorage.getItem('mcrm_theme');
  if(savedTheme){
    document.body.setAttribute('data-theme', savedTheme);
    document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active', d.dataset.theme===savedTheme));
  }

  hideLoader();
  const savedUser = localStorage.getItem('mcrm_user');
  if(savedUser){
    CURRENT_USER = savedUser;
    document.getElementById('authScreen').classList.add('hidden');
    enterApp();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
  }
});
</script>
