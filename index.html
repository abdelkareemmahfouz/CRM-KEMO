<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mini CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#0e0e10">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --gold:#D4AF37; --gold-light:#f1d979; --black:#0e0e10; --black2:#161618;
  --pink:#ff7aa8; --green:#8fd19e;
  --bg:#0e0e10; --surface:#1a1a1d; --surface2:#222226; --text:#f2f2f2; --muted:#9a9aa0;
  --accent:#D4AF37; --accent2:#f1d979; --radius:16px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --danger:#e5484d; --warn:#f5a623; --ok:#3ddc84;
  --sidebar-w:280px;
}
[data-theme="pinkgreen"]{
  --bg:#fff6f9; --surface:#ffffff; --surface2:#fdeef3; --text:#2b2b2b; --muted:#8a8a8a;
  --accent:#ff7aa8; --accent2:#8fd19e; --shadow:0 10px 30px rgba(232,93,146,.15);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Segoe UI', Tahoma, Arial, sans-serif;
  background:var(--bg); color:var(--text);
  transition:background .4s ease, color .4s ease;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--accent); border-radius:10px;}
.hidden{display:none !important;}

/* ---------- شاشة الدخول ---------- */
#authScreen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; position:relative; }
#authScreen::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 20% 20%, var(--accent) 0%, transparent 35%),
             radial-gradient(circle at 80% 80%, var(--accent2) 0%, transparent 35%);
  opacity:.08; pointer-events:none;
}
.auth-card{
  background:var(--surface); border-radius:var(--radius); padding:36px 30px;
  width:100%; max-width:400px; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,.06);
  animation:popIn .5s cubic-bezier(.2,.9,.3,1.1); position:relative; z-index:1;
}
@keyframes popIn{from{opacity:0; transform:translateY(24px) scale(.96);} to{opacity:1; transform:translateY(0) scale(1);}}
.auth-title{ text-align:center; font-size:26px; font-weight:800; margin-bottom:4px; color:var(--accent); letter-spacing:.5px; }
.auth-sub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:24px;}
.tabs{display:flex; background:var(--surface2); border-radius:12px; padding:4px; margin-bottom:22px;}
.tab-btn{ flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-weight:700; border-radius:10px; cursor:pointer; transition:.3s; }
.tab-btn.active{background:var(--accent); color:#111;}
.field{margin-bottom:16px; position:relative;}
.field label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid rgba(255,255,255,.08);
  background:var(--surface2); color:var(--text); font-size:14px; outline:none;
  transition:border-color .25s, box-shadow .25s;
}
.field input:focus, .field select:focus, .field textarea:focus{
  border-color:var(--accent); box-shadow:0 0 0 3px rgba(212,175,55,.15);
}
.btn{
  width:100%; padding:13px; border:none; border-radius:12px; font-weight:800; font-size:15px;
  cursor:pointer; transition:transform .2s, box-shadow .2s, filter .2s;
  background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#111;
}
.btn:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,.25); filter:brightness(1.05);}
.btn:active{transform:translateY(0) scale(.98);}
.btn-outline{background:transparent; border:1.5px solid var(--accent); color:var(--accent);}
.btn-sm{width:auto; padding:9px 14px; font-size:13px;}
.msg{font-size:13px; text-align:center; margin-top:12px; min-height:18px;}
.msg.error{color:var(--danger);}
.msg.ok{color:var(--ok);}
.spinner{
  width:18px; height:18px; border-radius:50%; border:3px solid rgba(0,0,0,.2);
  border-top-color:#111; display:inline-block; animation:spin .7s linear infinite; vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- تخطيط التطبيق ---------- */
#app{display:flex; min-height:100vh;}

/* شريط علوي للموبايل فقط */
#mobileTopbar{
  display:none; align-items:center; justify-content:space-between;
  background:var(--surface); padding:12px 16px; position:sticky; top:0; z-index:60;
  border-bottom:1px solid rgba(255,255,255,.06);
}
#mobileTopbar .brand{font-weight:800; color:var(--accent); font-size:17px;}
#hamburgerBtn{
  background:var(--surface2); border:1.5px solid var(--accent); color:var(--accent);
  border-radius:10px; width:40px; height:40px; font-size:18px; cursor:pointer;
}

.sidebar{
  width:var(--sidebar-w); background:var(--surface); border-left:1px solid rgba(255,255,255,.06);
  padding:22px 18px; display:flex; flex-direction:column; gap:16px;
  position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0;
  transition:transform .3s ease;
}
.brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:19px; color:var(--accent);}
.brand .dot{width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent);}
.user-chip{ background:var(--surface2); border-radius:12px; padding:12px 14px; font-size:13px; }
.user-chip b{color:var(--accent);}

.nav-item{
  display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:12px;
  background:transparent; border:none; color:var(--text); font-size:14px; font-weight:700;
  cursor:pointer; text-align:right; width:100%; transition:.2s;
}
.nav-item:hover{background:var(--surface2);}
.nav-item.active{background:var(--accent); color:#111;}

.theme-switch{display:flex; gap:8px;}
.theme-dot{
  flex:1; height:40px; border-radius:10px; cursor:pointer; border:2px solid transparent;
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; transition:.25s;
}
.theme-dot.gold{background:linear-gradient(135deg,#111,#D4AF37); color:#D4AF37;}
.theme-dot.pink{background:linear-gradient(135deg,#ff7aa8,#8fd19e); color:#fff;}
.theme-dot.active{border-color:var(--text); transform:scale(1.05);}
.logout-btn{
  margin-top:auto; background:transparent; border:1.5px solid var(--danger); color:var(--danger);
  padding:10px; border-radius:10px; font-weight:700; cursor:pointer; transition:.25s;
}
.logout-btn:hover{background:var(--danger); color:#fff;}

.main{flex:1; padding:24px; max-width:100%; overflow-x:hidden;}
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;}
.topbar h1{font-size:22px; color:var(--accent);}
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.toolbar input, .toolbar select{
  padding:10px 12px; border-radius:10px; border:1.5px solid rgba(255,255,255,.08);
  background:var(--surface2); color:var(--text); font-size:13px;
}
.add-btn{
  background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#111;
  border:none; padding:10px 18px; border-radius:10px; font-weight:800; cursor:pointer; transition:.25s;
}
.add-btn:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,.25);}
.action-bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
.ghost-btn{
  background:var(--surface2); border:1.5px solid var(--accent); color:var(--accent);
  padding:9px 14px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; transition:.2s;
}
.ghost-btn:hover{background:var(--accent); color:#111; transform:translateY(-2px);}

.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px; }
.card{
  background:var(--surface); border-radius:var(--radius); padding:16px; position:relative;
  border-right:6px solid var(--status-color, var(--accent));
  box-shadow:var(--shadow); transition:transform .25s, box-shadow .25s; animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
.card:hover{transform:translateY(-4px); box-shadow:0 16px 34px rgba(0,0,0,.3);}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.card-name{font-size:17px; font-weight:800;}
.status-badge{ font-size:11px; font-weight:800; padding:4px 10px; border-radius:20px; color:#111; white-space:nowrap; }
.card-phone{color:var(--muted); font-size:13px; margin:6px 0;}
.card-notes{ font-size:13px; color:var(--muted); margin:8px 0; max-height:50px; overflow:hidden; line-height:1.4; }
.card-last{font-size:11px; color:var(--muted); margin-bottom:10px;}
.card-actions{display:flex; gap:8px; flex-wrap:wrap;}
.icon-btn{
  border:none; border-radius:10px; padding:8px 12px; font-size:13px; cursor:pointer; font-weight:700;
  display:flex; align-items:center; gap:6px; transition:.2s;
}
.icon-btn:hover{transform:translateY(-2px);}
.wa-btn{background:#25D366; color:#fff;}
.edit-btn{background:var(--surface2); color:var(--text); border:1.5px solid var(--accent);}
.del-btn{background:transparent; color:var(--danger); border:1.5px solid var(--danger);}
.empty-state{text-align:center; padding:60px 20px; color:var(--muted);}

/* ---------- شاشة الإحصائيات المنفصلة ---------- */
.stats-grid-big{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
.stat-box-big{ background:var(--surface); border-radius:16px; padding:22px; text-align:center; box-shadow:var(--shadow); transition:transform .25s; }
.stat-box-big:hover{transform:translateY(-4px);}
.stat-box-big .num{font-size:34px; font-weight:800; color:var(--accent);}
.stat-box-big .lbl{font-size:13px; color:var(--muted); margin-top:6px;}
.charts-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.chart-card{ background:var(--surface); border-radius:16px; padding:18px; height:340px; box-shadow:var(--shadow); }
@media (max-width:900px){ .stats-grid-big{grid-template-columns:repeat(2,1fr);} .charts-row{grid-template-columns:1fr;} }

/* ---------- المودال ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center;
  justify-content:center; z-index:999; padding:16px; animation:fadeIn .25s;
}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal{
  background:var(--surface); border-radius:var(--radius); padding:26px; max-width:420px; width:100%;
  box-shadow:var(--shadow); animation:popIn .3s; max-height:90vh; overflow-y:auto;
}
.modal h2{color:var(--accent); margin-bottom:16px; font-size:19px;}
.status-picker{display:flex; gap:8px; margin-bottom:16px;}
.status-opt{
  flex:1; padding:10px 4px; text-align:center; border-radius:10px; cursor:pointer;
  font-size:12px; font-weight:700; border:2px solid transparent; color:#111; transition:.2s;
}
.status-opt.active{border-color:var(--text); transform:scale(1.05);}
.modal-actions{display:flex; gap:10px; margin-top:8px;}

/* ---------- توست ---------- */
#toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--surface2); color:var(--text); padding:12px 22px; border-radius:12px;
  box-shadow:var(--shadow); font-size:13px; opacity:0; pointer-events:none; transition:.35s;
  border:1px solid var(--accent); z-index:1200;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

#installBanner{
  position:fixed; bottom:0; left:0; right:0; background:var(--surface2); padding:14px 18px;
  display:flex; justify-content:space-between; align-items:center; gap:12px; z-index:1100;
  box-shadow:0 -6px 20px rgba(0,0,0,.25); transform:translateY(100%); transition:.4s;
}
#installBanner.show{transform:translateY(0);}
#installBanner span{font-size:13px;}
#installBanner .btn{width:auto; padding:8px 16px; font-size:13px;}

.loader-overlay{
  position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center;
  z-index:2000; flex-direction:column; gap:12px;
}
.big-spinner{
  width:46px; height:46px; border-radius:50%; border:4px solid rgba(212,175,55,.2);
  border-top-color:var(--accent); animation:spin .8s linear infinite;
}

/* ---------- استجابة الموبايل: sidebar خارج الشاشة (Off-canvas) ---------- */
#sidebarOverlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:59;
}
@media (max-width:820px){
  #mobileTopbar{display:flex;}
  .sidebar{
    position:fixed; right:0; top:0; height:100vh; z-index:61;
    transform:translateX(100%); box-shadow:-10px 0 30px rgba(0,0,0,.4);
  }
  .sidebar.open{transform:translateX(0);}
  #sidebarOverlay.show{display:block;}
  .main{padding:16px;}
  .stats-grid-big{grid-template-columns:repeat(2,1fr);}
  .chart-card{height:280px;}
}

/* ---------- طباعة ---------- */
@media print{
  #mobileTopbar, .sidebar, #sidebarOverlay, .toolbar, .add-btn, .action-bar,
  .card-actions, #toast, #installBanner, .modal-overlay{ display:none !important; }
  body, .main{background:#fff !important; color:#000 !important;}
  .card{ box-shadow:none !important; border:1px solid #ccc !important; break-inside:avoid; }
  .chart-card, .stat-box-big{ box-shadow:none !important; border:1px solid #ccc !important; }
}
</style>
</head>
<body data-theme="gold">

<div class="loader-overlay" id="pageLoader">
  <div class="big-spinner"></div>
  <div style="color:var(--muted); font-size:13px;">جاري التحميل...</div>
</div>

<!-- ============ شاشة الدخول/التسجيل ============ -->
<div id="authScreen" class="hidden">
  <div class="auth-card">
    <div class="auth-title">✦ Mini CRM</div>
    <div class="auth-sub">إدارة عملائك بذكاء وبساطة</div>
    <div class="tabs">
      <button class="tab-btn active" id="tabLoginBtn">دخول</button>
      <button class="tab-btn" id="tabRegisterBtn">حساب جديد</button>
    </div>
    <form id="loginForm">
      <div class="field"><label>اسم المستخدم</label><input type="text" id="loginUsername" required autocomplete="username"></div>
      <div class="field"><label>كلمة المرور</label><input type="password" id="loginPassword" required autocomplete="current-password"></div>
      <button type="submit" class="btn" id="loginBtn">دخول</button>
      <div class="msg" id="loginMsg"></div>
    </form>
    <form id="registerForm" class="hidden">
      <div class="field"><label>اسم المستخدم (مميز - بدون تكرار)</label><input type="text" id="regUsername" required minlength="3"></div>
      <div class="field"><label>كلمة المرور (7 أرقام/أحرف على الأقل)</label><input type="password" id="regPassword" required minlength="7"></div>
      <div class="field"><label>البريد الإلكتروني</label><input type="email" id="regEmail" required></div>
      <div class="field"><label>رقم الموبايل</label><input type="tel" id="regPhone" required placeholder="مثال: 01012345678"></div>
      <button type="submit" class="btn" id="registerBtn">إنشاء الحساب</button>
      <div class="msg" id="registerMsg"></div>
    </form>
  </div>
</div>

<!-- ============ التطبيق الرئيسي ============ -->
<div id="app" class="hidden">
  <div id="sidebarOverlay"></div>

  <div id="mobileTopbar">
    <button id="hamburgerBtn">☰</button>
    <div class="brand">✦ Mini CRM</div>
    <div style="width:40px;"></div>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="dot"></span> Mini CRM</div>
    <div class="user-chip">مرحبًا، <b id="sideUsername">-</b></div>

    <nav style="display:flex; flex-direction:column; gap:6px;">
      <button class="nav-item active" id="navClients">👥 العملاء</button>
      <button class="nav-item" id="navStats">📊 الإحصائيات</button>
    </nav>

    <div>
      <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">الثيم</div>
      <div class="theme-switch">
        <div class="theme-dot gold active" data-theme="gold">ذهبي</div>
        <div class="theme-dot pink" data-theme="pinkgreen">زهري</div>
      </div>
    </div>

    <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
  </aside>

  <main class="main">

    <!-- ===== شاشة العملاء ===== -->
    <section id="clientsView">
      <div class="topbar">
        <h1>عملاؤك</h1>
        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="بحث بالاسم أو الموبايل...">
          <select id="filterStatus">
            <option value="all">كل الحالات</option>
            <option value="hot">ساخن</option>
            <option value="warm">محتمل</option>
            <option value="cold">بارد</option>
          </select>
          <button class="add-btn" id="openAddModal">+ عميل جديد</button>
        </div>
      </div>

      <div class="action-bar">
        <button class="ghost-btn" id="previewClientsBtn">👁️ معاينة قبل الطباعة</button>
        <button class="ghost-btn" id="printClientsBtn">🖨️ طباعة القائمة</button>
        <button class="ghost-btn" id="downloadClientsPdfBtn">⬇️ تنزيل PDF</button>
        <button class="ghost-btn" id="downloadClientsDocBtn">⬇️ تنزيل DOC</button>
      </div>

      <div class="grid" id="clientsGrid"></div>
      <div class="empty-state hidden" id="emptyState">لا يوجد عملاء حتى الآن — ابدأ بإضافة أول عميل ✨</div>
    </section>

    <!-- ===== شاشة الإحصائيات (منفصلة) ===== -->
    <section id="statsView" class="hidden">
      <div class="topbar">
        <h1>الإحصائيات</h1>
      </div>

      <div class="action-bar">
        <button class="ghost-btn" id="previewStatsBtn">👁️ معاينة قبل الطباعة</button>
        <button class="ghost-btn" id="printStatsBtn">🖨️ طباعة الإحصائيات</button>
        <button class="ghost-btn" id="downloadStatsPdfBtn">⬇️ تنزيل PDF</button>
        <button class="ghost-btn" id="downloadStatsDocBtn">⬇️ تنزيل DOC</button>
      </div>

      <div class="stats-grid-big">
        <div class="stat-box-big"><div class="num" id="statTotal">0</div><div class="lbl">إجمالي العملاء</div></div>
        <div class="stat-box-big"><div class="num" id="statHot">0</div><div class="lbl">ساخن 🔥</div></div>
        <div class="stat-box-big"><div class="num" id="statWarm">0</div><div class="lbl">محتمل ⚡</div></div>
        <div class="stat-box-big"><div class="num" id="statCold">0</div><div class="lbl">بارد ❄️</div></div>
      </div>

      <div class="charts-row">
        <div class="chart-card"><canvas id="statusChart"></canvas></div>
        <div class="chart-card"><canvas id="trendChart"></canvas></div>
      </div>
    </section>

  </main>
</div>

<!-- ============ مودال الإضافة/التعديل ============ -->
<div class="modal-overlay hidden" id="clientModalOverlay">
  <div class="modal">
    <h2 id="modalTitle">عميل جديد</h2>
    <form id="clientForm">
      <input type="hidden" id="clientId">
      <div class="field"><label>اسم العميل</label><input type="text" id="clientName" required></div>
      <div class="field"><label>رقم الموبايل (بصيغة دولية بدون +، مثال: 201012345678)</label><input type="tel" id="clientPhone" required></div>
      <div class="field">
        <label>حالة العميل</label>
        <div class="status-picker" id="statusPicker">
          <div class="status-opt" data-status="hot" style="background:#e5484d;">ساخن 🔥</div>
          <div class="status-opt" data-status="warm" style="background:#f5a623;">محتمل ⚡</div>
          <div class="status-opt" data-status="cold" style="background:#4a90e2;">بارد ❄️</div>
        </div>
      </div>
      <div class="field"><label>ملاحظات</label><textarea id="clientNotes" rows="3"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModal">إلغاء</button>
        <button type="submit" class="btn" id="saveClientBtn">حفظ</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>
<div id="installBanner">
  <span>📲 ثبّت التطبيق على شاشتك الرئيسية لتجربة أسرع</span>
  <div style="display:flex; gap:8px;">
    <button class="btn" id="installBtn">تثبيت</button>
    <button class="btn btn-outline" id="dismissInstall">لاحقًا</button>
  </div>
</div>

<script>
/* =================== إعدادات الربط بالباك اند (Google Apps Script) =================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbye1NBN4Z8ecABqLkgZLI39eNr7t4PO3QCNzMOarfr1Y-MDuvJtsGDf1bAXb1hn5uWV/exec';

function callApi(action, payload){
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload })
  }).then(res => res.json());
}

if ('serviceWorker' in navigator) {

/* =================== إعدادات عامة =================== */
const STATUS_COLORS = { hot:'#e5484d', warm:'#f5a623', cold:'#4a90e2' };
const STATUS_LABELS = { hot:'ساخن 🔥', warm:'محتمل ⚡', cold:'بارد ❄️' };

let CURRENT_USER = null;
let CLIENTS = [];
let statusChartInstance = null;
let trendChartInstance = null;
let currentView = 'clients';

/* =================== أدوات مساعدة =================== */
function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? '#e5484d' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function setLoading(el, loading, originalText){
  if(loading){ el.disabled = true; el.dataset.original = el.innerHTML; el.innerHTML = '<span class="spinner"></span>'; }
  else { el.disabled = false; el.innerHTML = el.dataset.original || originalText; }
}
function hideLoader(){ document.getElementById('pageLoader').classList.add('hidden'); }
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = (str === undefined || str === null) ? '' : String(str);
  return div.innerHTML;
}
/* قراءة قيمة أول مفتاح موجود من قائمة مفاتيح محتملة (لتفادي فروق الأسماء بين الباك اند والفرونت) */
function pick(obj, keys){
  for(const k of keys){
    if(obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
  }
  return '';
}
/* تطبيع بيانات العميل القادمة من الباك اند لضمان ظهور كل الحقول دائمًا وتفادي أخطاء الأنواع (مثلاً رقم بدل نص) */
function normalizeClient(c){
  return {
    id: String(pick(c, ['id','ID','Id']) || ''),
    name: String(pick(c, ['name','Name']) || ''),
    phone: String(pick(c, ['phone','Phone']) || ''),
    status: String(pick(c, ['status','Status']) || 'warm'),
    notes: String(pick(c, ['notes','Notes']) || ''),
    lastContact: String(pick(c, ['lastContact','LastContact']) || ''),
    createdAt: String(pick(c, ['createdAt','CreatedAt']) || '')
  };
}

/* =================== تحميل العملاء =================== */
function loadClients(){
  callApi('getClients', { username: CURRENT_USER })
    .then(function(res){
      if(res.ok){
        CLIENTS = (res.data || []).map(normalizeClient);
        renderClients();
        renderStats();
      } else {
        showToast(res.message, true);
      }
    })
    .catch(function(err){ showToast('خطأ: ' + err.message, true); });
}

/* =================== عرض العملاء =================== */
function getFilteredClients(){
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const filter = document.getElementById('filterStatus').value;
  let list = CLIENTS.filter(c=>{
    const matchSearch = !search || (c.name||'').toLowerCase().includes(search) || (c.phone||'').includes(search);
    const matchFilter = filter==='all' || c.status===filter;
    return matchSearch && matchFilter;
  });
  list.sort((a,b)=> new Date(b.lastContact||b.createdAt||0) - new Date(a.lastContact||a.createdAt||0));
  return list;
}

function renderClients(){
  const grid = document.getElementById('clientsGrid');
  const empty = document.getElementById('emptyState');
  const list = getFilteredClients();

  grid.innerHTML = '';
  if(list.length===0){ empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  list.forEach(c=>{
    const color = STATUS_COLORS[c.status] || '#999';
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--status-color', color);
    const waLink = 'https://wa.me/' + (c.phone||'').replace(/[^0-9]/g,'');
    const lastContactStr = c.lastContact ? new Date(c.lastContact).toLocaleString('ar-EG') : '-';
    const displayName = c.name || 'بدون اسم';

    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${escapeHtml(displayName)}</div>
        <div class="status-badge" style="background:${color};">${STATUS_LABELS[c.status]||c.status}</div>
      </div>
      <div class="card-phone">📱 ${escapeHtml(c.phone || 'بدون رقم')}</div>
      <div class="card-notes">${escapeHtml(c.notes||'بدون ملاحظات')}</div>
      <div class="card-last">آخر تواصل: ${lastContactStr}</div>
      <div class="card-actions">
        <a class="icon-btn wa-btn" href="${waLink}" target="_blank" onclick="markContacted('${c.id}')">💬 واتساب</a>
        <button class="icon-btn edit-btn" onclick="openEditModal('${c.id}')">✏️ تعديل</button>
        <button class="icon-btn del-btn" onclick="removeClient('${c.id}')">🗑️ حذف</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.getElementById('searchInput').addEventListener('input', renderClients);
document.getElementById('filterStatus').addEventListener('change', renderClients);

/* =================== تحديث آخر تواصل عند فتح واتساب =================== */
function markContacted(id){
  const c = CLIENTS.find(x=>x.id===id);
  if(!c) return;
  c.lastContact = new Date().toISOString();
  callApi('updateClient', { username: CURRENT_USER, client: c }).catch(()=>{});
}

/* =================== المودال: إضافة/تعديل =================== */
let selectedStatus = 'warm';
function openStatusPicker(){
  document.querySelectorAll('.status-opt').forEach(el=>{
    el.classList.toggle('active', el.dataset.status===selectedStatus);
    el.onclick = ()=>{
      selectedStatus = el.dataset.status;
      document.querySelectorAll('.status-opt').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
    };

}
document.getElementById('openAddModal').addEventListener('click', ()=>{
  document.getElementById('modalTitle').textContent = 'عميل جديد';
  document.getElementById('clientId').value = '';
  document.getElementById('clientName').value = '';
  document.getElementById('clientPhone').value = '';
  document.getElementById('clientNotes').value = '';
  selectedStatus = 'warm';
  openStatusPicker();
  document.getElementById('clientModalOverlay').classList.remove('hidden');
});
function openEditModal(id){
  const c = CLIENTS.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modalTitle').textContent = 'تعديل عميل';
  document.getElementById('clientId').value = c.id;
  document.getElementById('clientName').value = c.name;
  document.getElementById('clientPhone').value = c.phone;
  document.getElementById('clientNotes').value = c.notes;

  openStatusPicker();

document.getElementById('cancelModal').addEventListener('click', ()=>{
  document.getElementById('clientModalOverlay').classList.add('hidden');
});

document.getElementById('clientForm').addEventListener('submit', function(e){
  e.preventDefault();
  const btn = document.getElementById('saveClientBtn');
  const id = document.getElementById('clientId').value;
  const data = {
    id: id || undefined,
    name: document.getElementById('clientName').value.trim(),
    phone: document.getElementById('clientPhone').value.trim(),
    status: selectedStatus,
    notes: document.getElementById('clientNotes').value.trim(),
    lastContact: new Date().toISOString()
  };
  setLoading(btn, true);

  if(id){
    callApi('updateClient', { username: CURRENT_USER, client: data })
      .then(function(res){
        setLoading(btn, false, 'حفظ');
        if(res.ok){ showToast('تم التحديث ✅'); document.getElementById('clientModalOverlay').classList.add('hidden'); loadClients(); }
        else showToast(res.message, true);
      })
      .catch(function(err){ setLoading(btn, false, 'حفظ'); showToast(err.message, true); });
  } else {
    callApi('addClient', { username: CURRENT_USER, client: data })
      .then(function(res){
        setLoading(btn, false, 'حفظ');
        if(res.ok){ showToast('تمت الإضافة ✅'); document.getElementById('clientModalOverlay').classList.add('hidden'); loadClients(); }
        else showToast(res.message, true);
      })
      .catch(function(err){ setLoading(btn, false, 'حفظ'); showToast(err.message, true); });
  }
});

function removeClient(id){
  if(!confirm('هل تريد حذف هذا العميل؟')) return;
  callApi('deleteClient', { username: CURRENT_USER, clientId: id })
    .then(function(res){
      if(res.ok){ showToast('تم الحذف 🗑️'); loadClients(); }
      else showToast(res.message, true);
    })
    .catch(function(err){ showToast(err.message, true); });
}

/* =================== الإحصائيات + Chart.js =================== */
function renderStats(){
  const total = CLIENTS.length;
  const hot = CLIENTS.filter(c=>c.status==='hot').length;
  const warm = CLIENTS.filter(c=>c.status==='warm').length;
  const cold = CLIENTS.filter(c=>c.status==='cold').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statHot').textContent = hot;
  document.getElementById('statWarm').textContent = warm;
  document.getElementById('statCold').textContent = cold;

  if(currentView !== 'stats') return; // لا نرسم الشارتس إلا لو شاشة الإحصائيات ظاهرة
  renderStatusChart(hot, warm, cold);
  renderTrendChart();
}

function renderStatusChart(hot, warm, cold){
  const ctx = document.getElementById('statusChart');
  const data = {
    labels: ['ساخن', 'محتمل', 'بارد'],
    datasets: [{ data: [hot, warm, cold], backgroundColor: ['#e5484d','#f5a623','#4a90e2'], borderWidth: 0 }]
  };
  const options = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ position:'bottom', labels:{ color:'#D4AF37', font:{size:12} } }, title:{ display:true, text:'توزيع الحالات', color:'#D4AF37', font:{size:14} } }
  };
  if(statusChartInstance){ statusChartInstance.destroy(); }
  statusChartInstance = new Chart(ctx, { type:'doughnut', data, options });
}

function renderTrendChart(){
  const days = []; const counts = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.toLocaleDateString('ar-EG', {day:'2-digit', month:'2-digit'}));
    const count = CLIENTS.filter(c=>{
      const cd = new Date(c.createdAt);
      return cd.toDateString() === d.toDateString();
    }).length;
    counts.push(count);
  }
  const ctx = document.getElementById('trendChart');
  const data = { labels: days, datasets: [{ label:'عملاء جدد', data: counts, borderColor:'#D4AF37', backgroundColor:'rgba(212,175,55,.25)', tension:.4, fill:true }] };
  const options = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false }, title:{ display:true, text:'نشاط آخر 7 أيام', color:'#D4AF37', font:{size:14} } },
    scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1, color:'#999' } }, x:{ ticks:{ color:'#999' } } }
  };
  if(trendChartInstance){ trendChartInstance.destroy(); }
  trendChartInstance = new Chart(ctx, { type:'line', data, options });
}

/* =================== الثيمات =================== */
document.querySelectorAll('.theme-dot').forEach(dot=>{
  dot.addEventListener('click', ()=>{
    const theme = dot.dataset.theme;
    document.body.setAttribute('data-theme', theme);

});

/* =================== الطباعة / المعاينة / التنزيل =================== */
function buildClientsHtml(){
  const list = getFilteredClients();
  const rows = list.map(c => `
    <tr>
      <td>${escapeHtml(c.name||'-')}</td>
      <td>${escapeHtml(c.phone||'-')}</td>
      <td>${escapeHtml(STATUS_LABELS[c.status]||c.status||'-')}</td>
      <td>${escapeHtml(c.notes||'-')}</td>
      <td>${c.lastContact ? new Date(c.lastContact).toLocaleString('ar-EG') : '-'}</td>
    </tr>`).join('');
  return `
    <h1 style="color:#8a6d1f;">Mini CRM — قائمة العملاء</h1>
    <p style="color:#555; font-size:13px;">تاريخ الطباعة: ${new Date().toLocaleString('ar-EG')} — إجمالي العملاء: ${list.length}</p>
    <table border="1" cellspacing="0" cellpadding="8" style="width:100%; border-collapse:collapse; font-family:Arial; direction:rtl;">
      <thead style="background:#111; color:#D4AF37;">
        <tr><th>الاسم</th><th>الموبايل</th><th>الحالة</th><th>ملاحظات</th><th>آخر تواصل</th></tr>
      </thead>
      <tbody>${rows || '<tr><td colspan="5" style="text-align:center;">لا يوجد عملاء</td></tr>'}</tbody>
    </table>`;
}

function buildStatsHtml(){
  const total = CLIENTS.length;
  const hot = CLIENTS.filter(c=>c.status==='hot').length;
  const warm = CLIENTS.filter(c=>c.status==='warm').length;
  const cold = CLIENTS.filter(c=>c.status==='cold').length;
  let chartsHtml = '';
  try{
    if(statusChartInstance) chartsHtml += `<img src="${statusChartInstance.toBase64Image()}" style="width:45%; display:inline-block; margin:10px 2%;">`;
    if(trendChartInstance) chartsHtml += `<img src="${trendChartInstance.toBase64Image()}" style="width:45%; display:inline-block; margin:10px 2%;">`;
  }catch(e){}
  return `
    <h1 style="color:#8a6d1f;">Mini CRM — تقرير الإحصائيات</h1>
    <p style="color:#555; font-size:13px;">تاريخ التقرير: ${new Date().toLocaleString('ar-EG')}</p>
    <table border="1" cellspacing="0" cellpadding="10" style="width:100%; border-collapse:collapse; font-family:Arial; direction:rtl; margin-bottom:16px;">
      <tr style="background:#111; color:#D4AF37;"><th>إجمالي العملاء</th><th>ساخن</th><th>محتمل</th><th>بارد</th></tr>
      <tr style="text-align:center;"><td>${total}</td><td>${hot}</td><td>${warm}</td><td>${cold}</td></tr>
    </table>
    <div style="text-align:center;">${chartsHtml}</div>`;
}

function openPreviewWindow(title, bodyHtml){
  const w = window.open('', '_blank');
  if(!w){ showToast('برجاء السماح بالنوافذ المنبثقة (Popups) لعرض المعاينة', true); return null; }
  w.document.write(`
    <html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>${title}</title>
    <style>
      body{font-family:Arial, sans-serif; padding:24px; background:#fff; color:#000;}
      .actions{margin-bottom:20px; display:flex; gap:10px;}
      button{padding:10px 18px; border-radius:8px; border:1px solid #D4AF37; background:#D4AF37; color:#111; font-weight:bold; cursor:pointer;}
      button.outline{background:#fff; color:#333; border:1px solid #999;}
      @media print{ .actions{display:none;} }
    </style></head>
    <body>
      <div class="actions">
        <button onclick="window.print()">🖨️ طباعة / حفظ كـ PDF</button>
        <button class="outline" onclick="window.close()">إغلاق</button>
      </div>
      ${bodyHtml}
    </body></html>
  `);
  w.document.close();
  return w;
}

function downloadAsDoc(filename, bodyHtml){
  const fullHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8"></head><body dir="rtl">${bodyHtml}</body></html>`;
  const blob = new Blob(['\ufeff', fullHtml], { type: 'application/msword' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
